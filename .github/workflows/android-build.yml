name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Rust and Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clean and force Tauri 2.2.3
        run: |
          rm -rf node_modules package-lock.json
          npm install @tauri-apps/api@2.2.3 --save-exact
          npm install @tauri-apps/cli@2.2.3 --save-dev --save-exact
          npm install

      - name: Check installed versions
        run: npm list @tauri-apps/api @tauri-apps/cli

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI 2.2.3
        run: cargo install tauri-cli --version 2.2.3 --locked

      - name: Check h_pt factory status
        run: |
          if [ -d "h_pt" ]; then
            echo "h_pt factory found - untouched ✅"
            ls h_pt/
          else
            echo "No h_pt folder - safe ✅"
          fi

      - name: Initialize Android project
        run: cargo tauri android init --ci

      - name: Build Android APK
        run: cargo tauri android build --apk --ci

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: causal-one-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
