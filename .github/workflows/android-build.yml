name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Force Tauri 2.2.3 + Clean Cache
        run: |
          rm -rf node_modules package-lock.json
          npm install @tauri-apps/api@2.2.3 --save --save-exact
          npm install @tauri-apps/cli@2.2.3 --save-dev --save-exact
          npm install

      - name: Verify versions
        run: |
          echo "Checking installed versions..."
          npm list @tauri-apps/api @tauri-apps/cli

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI 2.2.3
        run: cargo install tauri-cli --version 2.2.3 --locked

      - name: Verify h_pt factory
        run: ls -la h_pt/ || echo "h_pt safe ✅"

      - name: Init Android
        run: cargo tauri android init --ci

      - name: Build Android APK
        run: cargo tauri android build --apk --ci

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: causal-one-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
          if-no-files-found: error
