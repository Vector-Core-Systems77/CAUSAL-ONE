name: Build CAUSAL-ONE Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK + NDK 25.2.9519653
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;25.2.9519653 platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set Android Env
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install Rust + Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install deps
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Init Android
        run: cargo tauri android init --ci

      - name: Build Android Debug APK
        run: cargo tauri android build --apk --universal

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: causal-one-android-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
