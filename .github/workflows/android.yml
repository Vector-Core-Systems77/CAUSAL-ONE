name: Build CAUSAL-ONE Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install deps
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Init Android
        run: npm run tauri android init --ci
        continue-on-error: true

      - name: Build Android APK
        run: cargo tauri android build --apk --universal

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: causal-one-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
