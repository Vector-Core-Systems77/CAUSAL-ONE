name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust & Android NDK
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
          npm install -g @tauri-apps/cli

      - name: Build Project
        run: |
          # 1. تثبيت الحزم
          npm install
          
          # 2. إنشاء الهيكلية الأساسية التي يتوقعها Tauri
          mkdir -p src-tauri
          
          # 3. إنشاء ملف توري الأساسي
          echo '{"productName": "causalone", "version": "0.1.0", "identifier": "com.causal.one", "build": {"frontendDist": "../dist"}, "bundle": {"active": true, "targets": ["app"]}}' > src-tauri/tauri.conf.json
          
          # 4. بناء الويب
          npm run build
          
          # 5. تهيئة أندرويد والبناء
          tauri android init
          tauri android build
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Causal-One-APK
          path: src-tauri/gen/android/app/build/outputs/apk/debug/
