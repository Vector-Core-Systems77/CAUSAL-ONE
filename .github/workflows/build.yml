name: Build CAUSAL-ONE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # الخطوة الحاسمة: إنشاء الملف المفقود برمجياً
      - name: Create missing package.json
        run: |
          echo '{
            "name": "causal-one",
            "version": "0.1.0",
            "scripts": {
              "tauri": "tauri"
            },
            "devDependencies": {
              "@tauri-apps/cli": "^2.0.0"
            }
          }' > package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # تشغيل tauri باستخدام npx لتجاوز أي مشاكل في السكربتات
      - name: Build project
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Causal-One-Bundle
          path: src-tauri/target/release/bundle/
