name: Build CAUSAL-ONE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Project Environment
        run: |
          echo '{"name":"causal-one","version":"0.1.0","scripts":{"build":"vite build","tauri":"tauri"},"devDependencies":{"@tauri-apps/cli":"2.1.0","typescript":"^5.5.3","vite":"^5.4.2","@vitejs/plugin-react":"^4.3.1"},"dependencies":{"react":"^18.3.1","react-dom":"^18.3.1","@tauri-apps/api":"2.1.0"}}' > package.json
          echo 'import { defineConfig } from "vite"; import react from "@vitejs/plugin-react"; export default defineConfig({plugins: [react()], build: {outDir: "dist"}});' > vite.config.ts
          echo 'import React from "react"; import ReactDOM from "react-dom/client"; import App from "./App"; ReactDOM.createRoot(document.getElementById("root") as HTMLElement).render(<React.StrictMode><App /></React.StrictMode>);' > src/main.tsx
          echo 'import React from "react"; function App() { return (<div><h1>CAUSAL-ONE IS RUNNING</h1></div>); } export default App;' > src/App.tsx
          # ملف إعدادات بدون أي أيقونات وبدون أي إشارات لملفات خارجية
          echo '{"$schema": "../node_modules/@tauri-apps/cli/schema.json", "productName": "causal-one", "version": "0.1.0", "identifier": "com.causal.one.app", "build": {"frontendDist": "../dist"}, "app": {"windows": [{"title": "CAUSAL-ONE", "width": 800, "height": 600}], "security": {"csp": null}}, "bundle": {"active": false}}' > src-tauri/tauri.conf.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Ubuntu Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npx vite build

      - name: Fix Cargo Structure
        run: |
          echo 'fn main() { tauri_build::build() }' > src-tauri/build.rs
          echo '[package]
          name = "causal-one"
          version = "0.1.0"
          edition = "2021"
          build = "build.rs"

          [lib]
          path = "src/lib.rs"

          [[bin]]
          name = "causal-one"
          path = "src/main.rs"

          [dependencies]
          tauri = "2.1.0"
          serde = { version = "1.0", features = ["derive"] }
          serde_json = "1.0"

          [build-dependencies]
          tauri-build = "2.1.0"' > src-tauri/Cargo.toml

      # تنظيف مجلد target قبل البناء لإجبار Rust على إعادة قراءة الإعدادات الجديدة
      - name: Clean and Build
        run: |
          cd src-tauri && cargo clean && cd ..
          npx tauri build --config src-tauri/tauri.conf.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Causal-One-Bundle
          path: src-tauri/target/release/bundle/
