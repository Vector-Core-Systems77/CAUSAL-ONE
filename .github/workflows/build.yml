name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # تثبيت بيئة أندرويد المطلوبة
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust target for Android
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Setup Project Environment
        run: |
          echo '{"name":"causal-one","version":"0.1.0","scripts":{"build":"vite build","tauri":"tauri"},"devDependencies":{"@tauri-apps/cli":"2.1.0","typescript":"^5.5.3","vite":"^5.4.2","@vitejs/plugin-react":"^4.3.1"},"dependencies":{"react":"^18.3.1","react-dom":"^18.3.1","@tauri-apps/api":"2.1.0"}}' > package.json
          echo '{"$schema": "../node_modules/@tauri-apps/cli/schema.json", "productName": "causal-one", "version": "0.1.0", "identifier": "com.causal.one.app", "build": {"frontendDist": "../dist"}, "bundle": {"active": true, "targets": ["app"]}}' > src-tauri/tauri.conf.json

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npx vite build

      - name: Build Android APK
        run: |
          # نستخدم tauri mobile للبناء
          npm install -g @tauri-apps/cli
          tauri android init
          tauri android build --release
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_HOME: ${{ steps.setup-android.outputs.android-sdk-path }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Causal-One-APK
          path: src-tauri/gen/android/app/build/outputs/apk/release/
