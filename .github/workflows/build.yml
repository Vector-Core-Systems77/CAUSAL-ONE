name: Build CAUSAL-ONE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. إنشاء ملفات البيئة الأساسية تلقائياً
      - name: Setup Project Environment
        run: |
          echo '{"name":"causal-one","version":"0.1.0","scripts":{"build":"vite build","tauri":"tauri"},"devDependencies":{"@tauri-apps/cli":"^2.0.0","typescript":"^5.5.3","vite":"^5.4.2","@vitejs/plugin-react":"^4.3.1"},"dependencies":{"react":"^18.3.1","react-dom":"^18.3.1"}}' > package.json
          echo 'import { defineConfig } from "vite"; import react from "@vitejs/plugin-react"; export default defineConfig({plugins: [react()], build: {outDir: "dist"}});' > vite.config.ts

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Ubuntu Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Install Dependencies
        run: npm install

      # 2. بناء الواجهة أولاً لإنشاء مجلد dist
      - name: Build Frontend
        run: npx vite build

      # 3. بناء تطبيق Tauri
      - name: Build Project
        run: npx tauri build --config src-tauri/tauri.conf.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Causal-One-Bundle
          path: src-tauri/target/release/bundle/
