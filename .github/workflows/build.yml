name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
      NDK_VERSION: 25.2.9519653

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: 'platforms;android-34 platform-tools ndk;${{ env.NDK_VERSION }}'
          accept-licenses: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: cargo install tauri-cli --version "^2.0" --locked

      - name: Create Project Files
        run: |
          rm -rf src-tauri
          mkdir -p src-tauri/src src-tauri/icons
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > src-tauri/icons/icon.png
          
          cat <<EOF > index.html
          <!DOCTYPE html><html><head><meta charset="UTF-8"><title>Causal One</title></head>
          <body><div id="root"></div><script type="module" src="/src/main.tsx"></script></body></html>
          EOF
          
          cat <<EOF > package.json
          { "name": "causal-one", "version": "0.1.0", "scripts": { "build": "vite build" },
            "devDependencies": { "typescript": "^5.5.3", "vite": "^5.4.2", "@vitejs/plugin-react": "^4.3.1" },
            "dependencies": { "react": "^18.3.1", "react-dom": "^18.3.1" } }
          EOF
          
          cat <<EOF > tsconfig.json
          { "compilerOptions": { "target": "ES2020", "lib": ["DOM", "DOM.Iterable", "ESNext"], 
            "module": "ESNext", "skipLibCheck": true, "moduleResolution": "bundler",
            "allowImportingTsExtensions": true, "resolveJsonModule": true, "isolatedModules": true,
            "noEmit": true, "jsx": "react-jsx", "strict": true }, "include": ["src"] }
          EOF
          
          cat <<EOF > vite.config.ts
          import { defineConfig } from "vite"; import react from "@vitejs/plugin-react";
          export default defineConfig({ plugins: [react()], build: { outDir: "dist" } });
          EOF
          
          mkdir -p src
          echo 'import React from "react"; function App() { return (<div><h1>CAUSAL-ONE IS RUNNING</h1></div>); } export default App;' > src/App.tsx
          echo 'import "./App.css"; import React from "react"; import ReactDOM from "react-dom/client"; import App from "./App";
          ReactDOM.createRoot(document.getElementById("root")!).render(<React.StrictMode><App /></React.StrictMode>);' > src/main.tsx
          echo 'body { margin: 0; font-family: sans-serif; }' > src/App.css
          
          cat <<EOF > src-tauri/tauri.conf.json
          { "productName": "causalone", "version": "0.1.0", "identifier": "com.causal.one",
            "app": { "windows": [{ "title": "causalone", "width": 800, "height": 600 }] },
            "build": { "frontendDist": "../dist" },
            "bundle": { "active": true, "targets": ["apk"], "icon": ["icons/icon.png"] } }
          EOF
          
          cat <<EOF > src-tauri/src/lib.rs
          #[cfg_attr(mobile, tauri::mobile_entry_point)]
          pub fn run() {
            tauri::Builder::default()
              .invoke_handler(tauri::generate_handler![greet])
              .run(tauri::generate_context!())
              .expect("error while running tauri application");
          }
          #[tauri::command]
          fn greet(name: &str) -> String { format!("Hello, {}!", name) }
          EOF
          
          cat <<EOF > src-tauri/Cargo.toml
          [package]
          name = "causal-one"
          version = "0.1.0"
          edition = "2021"
          [build-dependencies]
          tauri-build = { version = "2.0.0" }
          [dependencies]
          tauri = { version = "2.0.0" }
          [lib]
          name = "causal_one_lib"
          path = "src/lib.rs"
          crate-type = ["staticlib", "cdylib", "rlib"]
          EOF
          
          echo 'fn main() { tauri_build::build() }' > src-tauri/build.rs

      - name: Fix NDK Path for Tauri
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" > src-tauri/local.properties

      - name: Build Frontend + Android
        run: |
          npm install  # ci راح يفشل بدون lockfile
          npm run build
          cargo tauri android init --ci
          cargo tauri android build --apk --universal

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Causal-One-APK
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
          if-no-files-found: error
