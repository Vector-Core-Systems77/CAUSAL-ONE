[package]
name = "causal-one"
version = "0.1.0"
edition = "2021"

[lib]
name = "causal_one_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.0", features = [] }
tauri-plugin-opener = "2.0"

# هذا هو الربط الأساسي لمكتبة المحرك الخاصة بنا
[dependencies.causal_one_lib]
path = "../src-tauri/src" 

[features]
default = []
mobile = []

[target.'cfg(target_os = "android")'.dependencies]
jni = "0.21"

[target.'cfg(target_os = "ios")'.dependencies]
objc2 = "0.5"
