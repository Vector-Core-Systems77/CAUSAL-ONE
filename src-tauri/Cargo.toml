[package]
name = "causal-one"
version = "0.1.0"
description = "نواة الذكاء السببي للجوال - DAG + do-calculus"
authors = ["Ismail Al-Shami"]
license = "MIT"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2", features = [] }

[target.'cfg(target_os = "android")'.dependencies]
jni = "0.21"
