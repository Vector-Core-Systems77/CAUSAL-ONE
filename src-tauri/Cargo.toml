[package]
name = "causal_one"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"

[lib]
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.3.5", features = ["android"] }
tauri-plugin-shell = "2.3.5"

[build-dependencies]
tauri-build = { version = "2.3.5" }
